name: Top Analysts 3yr Returns

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/top-analysts-3yr-returns-4b7dtg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run top analysts analysis
        run: |
          python3 - <<'PYEOF'
          import yfinance as yf
          import pandas as pd
          from datetime import datetime, timedelta, timezone
          from collections import defaultdict
          import warnings
          warnings.filterwarnings("ignore")

          # Use UTC-aware datetimes so we never need to strip tz from yfinance data
          end_dt   = datetime.now(timezone.utc)
          start_dt = end_dt - timedelta(days=3*365)

          # Quick connectivity test
          print("Testing yfinance connectivity...")
          test = yf.Ticker("AAPL")
          ud = test.upgrades_downgrades
          print(f"AAPL upgrades_downgrades: {type(ud).__name__}, shape: {ud.shape if ud is not None else 'None'}")
          if ud is not None and not ud.empty:
              print("Columns:", list(ud.columns))
              print("Index tz:", ud.index.tz)
              print("Sample:", ud.iloc[0].to_dict())

          TICKERS = [
              "AAPL","MSFT","GOOGL","AMZN","NVDA","META","TSLA","JPM","JNJ",
              "V","PG","UNH","HD","MA","XOM","LLY","CVX","ABBV","BAC",
              "KO","PFE","COST","MRK","WMT","MCD","CSCO","ORCL","ADBE","NFLX",
              "AMD","QCOM","GS","MS","BLK","CAT","NEE","RTX",
          ]
          BUY  = {"buy","strong buy","outperform","overweight","positive",
                  "market outperform","sector outperform","add","accumulate","top pick"}
          SELL = {"sell","strong sell","underperform","underweight","negative",
                  "reduce","market underperform","sector underperform"}

          firm_scores  = defaultdict(list)
          rosenblatt_calls = []  # detailed log for Rosenblatt

          print(f"\nAnalyzing {len(TICKERS)} stocks ({start_dt.date()} -> {end_dt.date()})...\n")

          for ticker in TICKERS:
              try:
                  stock = yf.Ticker(ticker)

                  recs = stock.upgrades_downgrades
                  if recs is None or recs.empty:
                      print(f"  {ticker:<6} -> no upgrade/downgrade data")
                      continue

                  # Normalize recs index to UTC-aware if needed
                  if recs.index.tz is None:
                      recs = recs.copy()
                      recs.index = recs.index.tz_localize("UTC")

                  recs = recs[recs.index >= start_dt]
                  if recs.empty:
                      print(f"  {ticker:<6} -> no data in 3yr range")
                      continue

                  hist = stock.history(start=start_dt, end=end_dt)
                  if hist.empty:
                      print(f"  {ticker:<6} -> no price history")
                      continue

                  # Normalize hist index to UTC-aware if needed
                  if hist.index.tz is None:
                      hist = hist.copy()
                      hist.index = hist.index.tz_localize("UTC")
                  elif str(hist.index.tz) != "UTC":
                      hist = hist.copy()
                      hist.index = hist.index.tz_convert("UTC")

                  scored = 0
                  for rec_date, row in recs.iterrows():
                      firm  = str(row.get("Firm", "")).strip()
                      grade = str(row.get("ToGrade", "")).strip().lower()
                      if not firm or not grade:
                          continue
                      is_buy  = grade in BUY
                      is_sell = grade in SELL
                      if not is_buy and not is_sell:
                          continue

                      prices_from = hist[hist.index >= rec_date]["Close"].dropna()
                      if prices_from.empty:
                          continue
                      price_in = prices_from.iloc[0]
                      if price_in == 0:
                          continue

                      exit_dt    = rec_date + timedelta(days=365)
                      prices_out = hist[hist.index >= exit_dt]["Close"].dropna()
                      if prices_out.empty:
                          prices_out = hist["Close"].dropna()
                      if prices_out.empty:
                          continue
                      price_out = prices_out.iloc[-1] if hist[hist.index >= exit_dt].empty else prices_out.iloc[0]

                      pct   = (price_out - price_in) / price_in * 100
                      score = pct if is_buy else -pct
                      firm_scores[firm].append(score)
                      scored += 1

                      if firm == "Rosenblatt":
                          rosenblatt_calls.append({
                              "ticker": ticker,
                              "date": rec_date.date(),
                              "grade": row.get("ToGrade",""),
                              "direction": "BUY" if is_buy else "SELL",
                              "price_in": price_in,
                              "price_out": price_out,
                              "return_pct": pct,
                              "score": score,
                          })

                  print(f"  {ticker:<6} -> {scored} calls scored")
              except Exception as e:
                  print(f"  {ticker:<6} -> ERROR: {e}")

          # Rank firms with at least 3 calls
          results = {
              firm: {"avg": sum(v)/len(v), "n": len(v), "wins": sum(s > 0 for s in v)}
              for firm, v in firm_scores.items() if len(v) >= 3
          }
          top10 = sorted(results.items(), key=lambda x: x[1]["avg"], reverse=True)[:10]

          print(f"\n{'='*65}")
          print("  TOP 10 - Investment Banks/Funds - 3yr Analyst Calls")
          print(f"{'='*65}")
          print(f"{'#':<4} {'Firm':<32} {'Avg Return':>12} {'Win Rate':>9} {'Calls':>7}")
          print(f"{'-'*65}")
          for rank, (firm, d) in enumerate(top10, 1):
              win_rate = d["wins"] / d["n"] * 100
              print(f"{rank:<4} {firm:<32} {d['avg']:>10.1f}% {win_rate:>7.1f}% {d['n']:>7}")
          print(f"{'='*65}")
          total_calls = sum(d['n'] for _,d in top10)
          print(f"\n  Total: {total_calls} calls analyzed, {len(results)} firms with 3+ calls")

          # Rosenblatt detailed breakdown
          print(f"\n\n{'='*80}")
          print("  ROSENBLATT — All Calls Detail")
          print(f"{'='*80}")
          print(f"{'Date':<12} {'Ticker':<8} {'Direction':<8} {'Grade':<20} {'Buy@':>8} {'Exit@':>8} {'Return':>8}  Result")
          print(f"{'-'*80}")
          for c in sorted(rosenblatt_calls, key=lambda x: x["date"]):
              result = "WIN" if c["score"] > 0 else "LOSS"
              print(f"{str(c['date']):<12} {c['ticker']:<8} {c['direction']:<8} {c['grade']:<20} "
                    f"{c['price_in']:>8.2f} {c['price_out']:>8.2f} {c['return_pct']:>7.1f}%  {result}")
          print(f"{'='*80}")
          wins  = sum(1 for c in rosenblatt_calls if c["score"] > 0)
          avg_r = sum(c["score"] for c in rosenblatt_calls) / len(rosenblatt_calls) if rosenblatt_calls else 0
          print(f"  {len(rosenblatt_calls)} calls | {wins} wins ({wins/len(rosenblatt_calls)*100:.1f}%) | avg score: {avg_r:.1f}%")
          PYEOF
