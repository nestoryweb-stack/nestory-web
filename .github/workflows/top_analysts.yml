name: Top Analysts 3yr Returns

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FINNHUB_KEY: d0p2eo1r01qr8ds13ktgd0p2eo1r01qr8ds13ku0
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/top-analysts-3yr-returns-4b7dtg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Debug Finnhub API
        run: |
          python3 -c "
          import requests, json, os
          key = os.environ['FINNHUB_KEY']
          print('Key length:', len(key), '| starts with:', key[:8])
          headers = {'X-Finnhub-Token': key}

          r = requests.get('https://finnhub.io/api/v1/stock/upgrade-downgrade',
              params={'symbol': 'AAPL', 'from': '2024-01-01', 'to': '2025-01-01'},
              headers=headers, timeout=10)
          print('Status:', r.status_code)
          d = r.json()
          print('Type:', type(d).__name__, '| Len:', len(d) if isinstance(d, list) else '-')
          if isinstance(d, list) and d:
              print('Sample:', json.dumps(d[0], indent=2))
          else:
              print('Raw:', str(d)[:500])
          "

      - name: Run top analysts script
        run: python scripts/top_analysts_3yr.py
