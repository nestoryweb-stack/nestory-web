name: Top Analysts 3yr Returns

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/top-analysts-3yr-returns-4b7dtg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run top analysts analysis - full S&P 500
        run: |
          python3 - <<'PYEOF'
          import yfinance as yf
          import pandas as pd
          from datetime import datetime, timedelta, timezone
          from collections import defaultdict
          import warnings
          warnings.filterwarnings("ignore")

          end_dt   = datetime.now(timezone.utc)
          start_dt = end_dt - timedelta(days=3*365)

          SP500 = [
              "MMM","AOS","ABT","ABBV","ACN","ADBE","AMD","AES","AFL","A",
              "APD","ABNB","AKAM","ALB","ARE","ALGN","ALLE","LNT","ALL","GOOGL",
              "GOOG","MO","AMZN","AMCR","AEE","AAL","AEP","AXP","AIG","AMT",
              "AWK","AMP","AME","AMGN","APH","ADI","ANSS","AON","APA","AAPL",
              "AMAT","APTV","ACGL","ADM","ANET","AJG","AIZ","T","ATO","ADSK",
              "AZO","AVB","AVY","AXON","BKR","BALL","BAC","BBWI","BAX","BDX",
              "BRK-B","BBY","BIO","TECH","BIIB","BLK","BX","BA","BCR","BMY",
              "AVGO","BR","BRO","BF-B","BLDR","BSX","BWA","BG","CDNS","CZR",
              "CPT","CPB","COF","CAH","KMX","CCL","CARR","CAT","CBOE","CBRE",
              "CDW","CE","COR","CNC","CNX","CDAY","CF","CRL","SCHW","CHTR",
              "CVX","CMG","CB","CHD","CI","CINF","CTAS","CSCO","C","CFG",
              "CLX","CME","CMS","KO","CTSH","CL","CMCSA","CAG","COP","ED",
              "STZ","CEG","COO","CPRT","GLW","CPAY","CTVA","CSGP","COST","CTRA",
              "CRWD","CCI","CSX","CMI","CVS","DHR","DRI","DVA","DAY","DECK",
              "DE","DAL","DVN","DXCM","FANG","DLR","DFS","DG","DLTR","D",
              "DPZ","DOV","DOW","DHI","DTE","DUK","DD","EMN","ETN","EBAY",
              "ECL","EIX","EW","EA","ELV","LLY","EMR","ENPH","ETR","EOG",
              "EPAM","EQT","EFX","EQIX","EQR","ESS","EL","ETSY","EG","EVRG",
              "ES","EXC","EXPE","EXPD","EXR","XOM","FFIV","FDS","FICO","FAST",
              "FRT","FDX","FIS","FITB","FSLR","FE","FI","FMC","F","FTNT",
              "FTV","FOXA","FOX","BEN","FCX","GRMN","IT","GE","GEHC","GEV",
              "GEN","GNRC","GD","GIS","GM","GPC","GILD","GS","HAL","HIG",
              "HAS","HCA","DOC","HSIC","HSY","HES","HPE","HLT","HOLX","HD",
              "HON","HRL","HST","HWM","HPQ","HUBB","HUM","HBAN","HII","IBM",
              "IEX","IDXX","ITW","INCY","IR","PODD","INTC","ICE","IFF","IP",
              "IPG","INTU","ISRG","IVZ","INVH","IQV","IRM","JBHT","JBL","JKHY",
              "J","JNJ","JCI","JPM","JNPR","K","KVUE","KDP","KEY","KEYS",
              "KMB","KIM","KMI","KKR","KLAC","KHC","KR","LHX","LH","LRCX",
              "LW","LVS","LDOS","LEN","LII","LILLY","LIN","LYV","LKQ","LMT",
              "L","LOW","LULU","LYB","MTB","MRO","MPC","MKTX","MAR","MMC",
              "MLM","MAS","MA","MTCH","MKC","MCD","MCK","MDT","MRK","META",
              "MET","MTD","MGM","MCHP","MU","MSFT","MAA","MRNA","MHK","MOH",
              "TAP","MDLZ","MPWR","MNST","MCO","MS","MOS","MSI","MSCI","NDAQ",
              "NTAP","NFLX","NEM","NWSA","NWS","NEE","NKE","NI","NDSN","NSC",
              "NTRS","NOC","NCLH","NRG","NUE","NVDA","NVR","NXPI","ORLY","OXY",
              "ODFL","OMC","ON","OKE","ORCL","OTIS","PCAR","PKG","PANW","PH",
              "PAYX","PAYC","PYPL","PNR","PEP","PFE","PCG","PM","PSX","PNW",
              "PNC","POOL","PPG","PPL","PFG","PG","PGR","PLD","PRU","PEG",
              "PTC","PSA","PHM","QRVO","PWR","QCOM","DGX","RL","RJF","RTX",
              "O","REG","REGN","RF","RSG","RMD","RVTY","ROK","ROL","ROP",
              "ROST","RCL","SPGI","CRM","SBAC","SLB","STX","SRE","NOW","SHW",
              "SPG","SWKS","SJM","SW","SNA","SOLV","SO","LUV","SWK","SBUX",
              "STT","STLD","STE","SYK","SMCI","SYF","SNPS","SYY","TMUS","TROW",
              "TTWO","TPR","TRGP","TGT","TEL","TDY","TFX","TER","TSLA","TXN",
              "TXT","TMO","TJX","TSCO","TT","TDG","TRV","TRMB","TFC","TYL",
              "TSN","USB","UBER","UDR","ULTA","UNP","UAL","UPS","URI","UNH",
              "UHS","VLO","VTR","VLTO","VRSN","VRSK","VZ","VRTX","VTRS","VICI",
              "V","VST","VMC","WRB","GWW","WAB","WBA","WMT","DIS","WBD","WM",
              "WAT","WEC","WFC","WELL","WST","WDC","WRK","WY","WHR","WMB",
              "WTW","WYNN","XEL","XYL","YUM","ZBRA","ZBH","ZTS",
          ]

          BUY  = {"buy","strong buy","outperform","overweight","positive",
                  "market outperform","sector outperform","add","accumulate","top pick"}
          SELL = {"sell","strong sell","underperform","underweight","negative",
                  "reduce","market underperform","sector underperform"}

          firm_scores     = defaultdict(list)
          rosenblatt_calls = []
          errors, skipped  = 0, 0

          print(f"Analyzing {len(SP500)} S&P 500 stocks ({start_dt.date()} -> {end_dt.date()})...\n")

          for i, ticker in enumerate(SP500, 1):
              try:
                  stock = yf.Ticker(ticker)

                  recs = stock.upgrades_downgrades
                  if recs is None or recs.empty:
                      skipped += 1
                      continue

                  if recs.index.tz is None:
                      recs = recs.copy()
                      recs.index = recs.index.tz_localize("UTC")

                  recs = recs[recs.index >= start_dt]
                  if recs.empty:
                      skipped += 1
                      continue

                  hist = stock.history(start=start_dt, end=end_dt)
                  if hist.empty:
                      skipped += 1
                      continue

                  if hist.index.tz is None:
                      hist = hist.copy()
                      hist.index = hist.index.tz_localize("UTC")
                  elif str(hist.index.tz) != "UTC":
                      hist = hist.copy()
                      hist.index = hist.index.tz_convert("UTC")

                  scored = 0
                  for rec_date, row in recs.iterrows():
                      firm  = str(row.get("Firm", "")).strip()
                      grade = str(row.get("ToGrade", "")).strip().lower()
                      if not firm or not grade:
                          continue
                      is_buy  = grade in BUY
                      is_sell = grade in SELL
                      if not is_buy and not is_sell:
                          continue

                      prices_from = hist[hist.index >= rec_date]["Close"].dropna()
                      if prices_from.empty:
                          continue
                      price_in = prices_from.iloc[0]
                      if price_in == 0:
                          continue

                      exit_dt    = rec_date + timedelta(days=365)
                      prices_out = hist[hist.index >= exit_dt]["Close"].dropna()
                      if prices_out.empty:
                          prices_out = hist["Close"].dropna()
                      if prices_out.empty:
                          continue
                      price_out = prices_out.iloc[-1] if hist[hist.index >= exit_dt].empty else prices_out.iloc[0]

                      pct   = (price_out - price_in) / price_in * 100
                      score = pct if is_buy else -pct
                      firm_scores[firm].append(score)
                      scored += 1

                      if firm == "Rosenblatt":
                          pt = row.get("currentPriceTarget", None)
                          try:
                              pt = float(pt) if pt and str(pt) not in ("nan","None","") else None
                          except:
                              pt = None

                          # Check if PT was hit within 12 months
                          pt_hit = None
                          pt_days = None
                          pt_upside_pct = None
                          if pt and price_in > 0:
                              pt_upside_pct = (pt - price_in) / price_in * 100
                              window = hist[(hist.index >= rec_date) & (hist.index <= exit_dt)]
                              if not window.empty:
                                  if is_buy:
                                      hit_dates = window[window["High"] >= pt]
                                  else:
                                      hit_dates = window[window["Low"] <= pt]
                                  if not hit_dates.empty:
                                      pt_hit = True
                                      pt_days = (hit_dates.index[0] - rec_date).days
                                  else:
                                      pt_hit = False

                          rosenblatt_calls.append({
                              "ticker": ticker,
                              "date": rec_date.date(),
                              "grade": row.get("ToGrade",""),
                              "direction": "BUY" if is_buy else "SELL",
                              "price_in": price_in,
                              "price_out": price_out,
                              "return_pct": pct,
                              "score": score,
                              "pt": pt,
                              "pt_upside_pct": pt_upside_pct,
                              "pt_hit": pt_hit,
                              "pt_days": pt_days,
                          })

                  if scored > 0:
                      print(f"  [{i:>3}/{len(SP500)}] {ticker:<6} -> {scored} calls scored")

              except Exception as e:
                  errors += 1

          print(f"\nDone. Errors: {errors}, Skipped (no data): {skipped}")

          results = {
              firm: {"avg": sum(v)/len(v), "n": len(v), "wins": sum(s > 0 for s in v)}
              for firm, v in firm_scores.items() if len(v) >= 5
          }
          top10 = sorted(results.items(), key=lambda x: x[1]["avg"], reverse=True)[:10]

          print(f"\n{'='*70}")
          print("  TOP 10 - Investment Banks/Funds - Full S&P 500 - 3yr Returns")
          print(f"{'='*70}")
          print(f"{'#':<4} {'Firm':<32} {'Avg Return':>12} {'Win Rate':>9} {'Calls':>7}")
          print(f"{'-'*70}")
          for rank, (firm, d) in enumerate(top10, 1):
              win_rate = d["wins"] / d["n"] * 100
              print(f"{rank:<4} {firm:<32} {d['avg']:>10.1f}% {win_rate:>7.1f}% {d['n']:>7}")
          print(f"{'='*70}")
          print(f"\n  {len(results)} firms qualified (5+ calls) | {sum(d['n'] for _,d in top10)} calls in top 10")

          # Rosenblatt price target analysis
          if rosenblatt_calls:
              with_pt    = [c for c in rosenblatt_calls if c["pt"] is not None]
              hit        = [c for c in with_pt if c["pt_hit"] is True]
              miss       = [c for c in with_pt if c["pt_hit"] is False]
              no_window  = [c for c in with_pt if c["pt_hit"] is None]
              hit_days   = [c["pt_days"] for c in hit if c["pt_days"] is not None]
              avg_upside = sum(c["pt_upside_pct"] for c in with_pt) / len(with_pt) if with_pt else 0

              print(f"\n{'='*75}")
              print("  ROSENBLATT — Price Target Analysis")
              print(f"{'='*75}")
              print(f"  Total calls analyzed:      {len(rosenblatt_calls)}")
              print(f"  Calls with price target:   {len(with_pt)}  ({len(with_pt)/len(rosenblatt_calls)*100:.0f}%)")
              print(f"  Avg PT upside from entry:  {avg_upside:.1f}%")
              print(f"  PT HIT within 12 months:   {len(hit)}  ({len(hit)/len(with_pt)*100:.1f}% of calls with PT)")
              print(f"  PT MISSED within 12 months:{len(miss)}  ({len(miss)/len(with_pt)*100:.1f}%)")
              if hit_days:
                  print(f"  Avg days to hit PT:        {sum(hit_days)/len(hit_days):.0f} days")
                  print(f"  Fastest PT hit:            {min(hit_days)} days")

              print(f"\n{'='*75}")
              print(f"  {'Date':<12} {'Ticker':<7} {'Entry':>7} {'PT':>7} {'PT%':>6} {'Hit?':<6} {'Days':>5} {'12m Return':>10}")
              print(f"  {'-'*73}")
              for c in sorted(with_pt, key=lambda x: x["date"]):
                  hit_str  = "HIT" if c["pt_hit"] else ("MISS" if c["pt_hit"] is False else "?")
                  days_str = str(c["pt_days"]) if c["pt_days"] else "-"
                  print(f"  {str(c['date']):<12} {c['ticker']:<7} {c['price_in']:>7.1f} {c['pt']:>7.1f} "
                        f"{c['pt_upside_pct']:>5.1f}% {hit_str:<6} {days_str:>5} {c['return_pct']:>9.1f}%")
              print(f"{'='*75}")
          PYEOF
